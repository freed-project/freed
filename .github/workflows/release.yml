name: Release Desktop App

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Force Automerge base64 WASM entry
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'node_modules/@automerge/automerge/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf-8'));
            let n = 0;
            for (const [, e] of Object.entries(pkg.exports || {})) {
              if (typeof e !== 'object' || !e.browser) continue;
              const b = e.browser;
              if (typeof b === 'object' && typeof b.import === 'string' && b.import.includes('bundler')) {
                b.import = b.import.replace(/fullfat_bundler/g, 'fullfat_base64');
                n++;
              }
            }
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            console.log('Forced ' + n + ' Automerge export(s) to fullfat_base64');
          "

      - name: Build workspace dependencies
        shell: bash
        run: |
          npm run build -w @freed/shared
          npm run build -w @freed/sync

      # macOS code signing (only runs if secrets are configured)
      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: "Freed v__VERSION__"
          releaseBody: |
            ## Freed v__VERSION__

            Download the appropriate installer for your platform below.

            **macOS:** `.dmg` (Apple Silicon or Intel)
            **Windows:** `.exe` (NSIS installer)
            **Linux:** `.AppImage`

            > **Note:** macOS users may need to right-click → Open on first launch until code signing is configured.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Upload a stable-named copy for /releases/latest/download/ links
      - name: Upload stable download alias
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          TARGET="${{ matrix.rust_target }}"
          ARTIFACTS_DIR="packages/desktop/src-tauri/target"

          case "$TARGET" in
            aarch64-apple-darwin)
              SRC="Freed_${VERSION}_aarch64.dmg"
              DST="Freed-macOS-arm64.dmg" ;;
            x86_64-apple-darwin)
              SRC="Freed_${VERSION}_x64.dmg"
              DST="Freed-macOS-x64.dmg" ;;
            x86_64-pc-windows-msvc)
              SRC="Freed_${VERSION}_x64-setup.exe"
              DST="Freed-Windows-x64-setup.exe" ;;
            x86_64-unknown-linux-gnu)
              SRC="Freed_${VERSION}_amd64.AppImage"
              DST="Freed-Linux-x64.AppImage" ;;
            *)
              echo "Unknown target: $TARGET"; exit 0 ;;
          esac

          found=$(find "$ARTIFACTS_DIR" -name "$SRC" -type f 2>/dev/null | head -1)
          if [ -n "$found" ]; then
            cp "$found" "/tmp/$DST"
            gh release upload "$TAG" "/tmp/$DST" --clobber || true
            echo "Uploaded $DST"
          else
            echo "Artifact $SRC not found — skipping alias"
          fi
