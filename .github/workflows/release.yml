name: Release Desktop App

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  promotion:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh release refs
        run: git fetch origin dev main

      - name: Validate production promotion state
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-dev ]]; then
            echo "Dev release detected, skipping production promotion validation."
            exit 0
          fi

          node scripts/validate-release-promotion.mjs --from-ref=origin/dev --to-ref="$GITHUB_SHA"

  # Load the reviewed, checked-in release notes for this tag.
  # The workflow refuses to freestyle release prose on its own.
  notes:
    needs: promotion
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.gen.outputs.release_body }}
      release_channel: ${{ steps.gen.outputs.release_channel }}
      is_prerelease: ${{ steps.gen.outputs.is_prerelease }}
      release_matrix: ${{ steps.gen.outputs.release_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Load reviewed release notes
        id: gen
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE_JSON="release-notes/releases/${TAG}.json"

          if [[ ! -f "$RELEASE_JSON" ]]; then
            echo "Missing ${RELEASE_JSON}. Run ./scripts/release.sh and review the generated notes before tagging." >&2
            exit 1
          fi

          APPROVED=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
            process.stdout.write(data.approved ? 'true' : 'false');
          " "$RELEASE_JSON")

          if [[ "$APPROVED" != "true" ]]; then
            echo "${RELEASE_JSON} is not approved. Review it, set approved=true, commit that change, then retag." >&2
            exit 1
          fi

          mapfile -t PRIOR_RELEASE_FILES < <(node -e "
            const fs = require('fs');
            const file = process.argv[1];
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            const currentTag = data.tag;
            const files = (data.source?.sameDayTagsIncluded ?? [])
              .filter((tag) => tag && tag !== currentTag)
              .map((tag) => 'release-notes/releases/' + tag + '.json')
              .filter((filePath) => fs.existsSync(filePath));
            for (const filePath of files) {
              process.stdout.write(filePath + '\n');
            }
          " "$RELEASE_JSON")

          node scripts/validate-release-notes.mjs "$RELEASE_JSON" "${PRIOR_RELEASE_FILES[@]}"

          BODY=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
            process.stdout.write(data.releaseBody || '');
          " "$RELEASE_JSON")

          CHANNEL=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
            const channel = data.channel || (String(data.version || '').endsWith('-dev') ? 'dev' : 'production');
            process.stdout.write(channel);
          " "$RELEASE_JSON")

          if [[ "$CHANNEL" != "production" && "$CHANNEL" != "dev" ]]; then
            echo "Unsupported release channel: $CHANNEL" >&2
            exit 1
          fi

          if [[ "$CHANNEL" == "production" && "$TAG" == *-dev ]]; then
            echo "Production release tags cannot end with -dev." >&2
            exit 1
          fi

          if [[ "$CHANNEL" == "dev" && "$TAG" != *-dev ]]; then
            echo "Dev release tags must end with -dev." >&2
            exit 1
          fi

          PRIMARY_RELEASE_MATRIX='{"include":[{"platform":"macos-latest","args":"--target aarch64-apple-darwin","rust_target":"aarch64-apple-darwin"},{"platform":"macos-latest","args":"--target x86_64-apple-darwin","rust_target":"x86_64-apple-darwin"},{"platform":"windows-latest","args":"--target x86_64-pc-windows-msvc","rust_target":"x86_64-pc-windows-msvc"},{"platform":"ubuntu-22.04","args":"","rust_target":"x86_64-unknown-linux-gnu"}]}'

          # Write to GITHUB_OUTPUT using heredoc to handle multiline
          {
            echo "release_body<<RELEASE_BODY_EOF"
            echo "$BODY"
            echo "RELEASE_BODY_EOF"
            echo "release_channel=$CHANNEL"
            if [[ "$CHANNEL" == "dev" ]]; then
              echo "is_prerelease=true"
            else
              echo "is_prerelease=false"
            fi
            echo "release_matrix=${PRIMARY_RELEASE_MATRIX}"
          } >> "$GITHUB_OUTPUT"

  validation:
    needs: notes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/desktop

      - name: Run channel validation
        shell: bash
        run: |
          if [[ "${{ needs.notes.outputs.release_channel }}" == "dev" ]]; then
            npm run validate:dev
          else
            npm run validate:production
          fi
        env:
          CI: "true"

  create-release:
    needs: [notes, validation]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Create or refresh draft release
        id: release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ needs.notes.outputs.release_body }}
          IS_PRERELEASE: ${{ needs.notes.outputs.is_prerelease }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          printf '%s' "$RELEASE_BODY" > release-body.md

          RELEASE_ID=$(gh api --paginate "repos/${{ github.repository }}/releases" \
            --jq ".[] | select(.tag_name == \"${TAG}\") | .id" \
            | head -n 1)

          if [[ -n "$RELEASE_ID" ]]; then
            jq -n \
              --arg name "Freed ${TAG}" \
              --rawfile body release-body.md \
              --argjson draft true \
              --argjson prerelease "$IS_PRERELEASE" \
              '{name: $name, body: $body, draft: $draft, prerelease: $prerelease}' \
              > release-patch.json
            gh api -X PATCH "repos/${{ github.repository }}/releases/${RELEASE_ID}" --input release-patch.json >/dev/null
          else
            jq -n \
              --arg tag_name "$TAG" \
              --arg target_commitish "$GITHUB_SHA" \
              --arg name "Freed ${TAG}" \
              --rawfile body release-body.md \
              --argjson draft true \
              --argjson prerelease "$IS_PRERELEASE" \
              '{tag_name: $tag_name, target_commitish: $target_commitish, name: $name, body: $body, draft: $draft, prerelease: $prerelease}' \
              > release-create.json
            gh api -X POST "repos/${{ github.repository }}/releases" --input release-create.json > created-release.json
            RELEASE_ID=$(jq -r '.id' created-release.json)
          fi

          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  release:
    needs: [notes, create-release]
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.notes.outputs.release_matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Force Automerge base64 WASM entry
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'node_modules/@automerge/automerge/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf-8'));
            let n = 0;
            for (const [, e] of Object.entries(pkg.exports || {})) {
              if (typeof e !== 'object' || !e.browser) continue;
              const b = e.browser;
              if (typeof b === 'object' && typeof b.import === 'string' && b.import.includes('bundler')) {
                b.import = b.import.replace(/fullfat_bundler/g, 'fullfat_base64');
                n++;
              }
            }
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            console.log('Forced ' + n + ' Automerge export(s) to fullfat_base64');
          "

      - name: Build workspace dependencies
        shell: bash
        run: |
          npm run build -w @freed/shared
          npm run build -w @freed/sync
          npm run build -w @freed/capture-rss

      - name: Validate Apple signing secrets
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_TEAM_ID APPLE_ID APPLE_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required macOS signing/notarization secrets: ${missing[*]}"
            exit 1
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
          # Public OAuth client IDs. No secret needed for desktop PKCE flows.
          VITE_DROPBOX_CLIENT_ID: yaqbppqya009gky
          VITE_GDRIVE_DESKTOP_CLIENT_ID: 304530272769-fkbpan1l071vdvum1j6kufvo8rbq6sm1.apps.googleusercontent.com
          VITE_GDRIVE_TOKEN_PROXY_URL: https://app.freed.wtf/api/oauth/google
        with:
          projectPath: packages/desktop
          tauriScript: npx tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ needs.notes.outputs.is_prerelease == 'true' }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      # Upload a stable-named copy for /releases/latest/download/ links
      - name: Upload stable download alias
        if: success() && needs.notes.outputs.release_channel == 'production'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          TARGET="${{ matrix.rust_target }}"
          ARTIFACTS_DIR="packages/desktop/src-tauri/target"

          case "$TARGET" in
            aarch64-apple-darwin)
              SRC="Freed_${VERSION}_aarch64.dmg"
              DST="Freed-macOS-arm64.dmg" ;;
            x86_64-apple-darwin)
              SRC="Freed_${VERSION}_x64.dmg"
              DST="Freed-macOS-x64.dmg" ;;
            x86_64-pc-windows-msvc)
              SRC="Freed_${VERSION}_x64-setup.exe"
              DST="Freed-Windows-x64-setup.exe" ;;
            x86_64-unknown-linux-gnu)
              SRC="Freed_${VERSION}_amd64.AppImage"
              DST="Freed-Linux-x64.AppImage" ;;
            *)
              echo "Unknown target: $TARGET"; exit 0 ;;
          esac

          found=$(find "$ARTIFACTS_DIR" -name "$SRC" -type f 2>/dev/null | head -1)
          if [ -n "$found" ]; then
            cp "$found" "/tmp/$DST"
            gh release upload "$TAG" "/tmp/$DST" --clobber || true
            echo "Uploaded $DST"
          else
            echo "Artifact $SRC not found, skipping alias"
          fi

  updater-manifest:
    needs: [release, notes, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ needs.notes.outputs.release_body }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          printf '%s' "$RELEASE_BODY" > release-body.md
          gh api "repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}" > release.json
          rm -rf updater-signatures
          mkdir -p updater-signatures
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.sig" --dir updater-signatures
          node scripts/generate-tauri-latest-from-release.mjs \
            --release-json release.json \
            --signature-dir updater-signatures \
            --notes-file release-body.md \
            --output latest.json \
            --pub-date "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh release upload "$TAG" latest.json --clobber --repo "${{ github.repository }}"

  # After all platform builds succeed, promote the draft to a published release
  publish:
    needs: updater-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"

  # Redeploy the public marketing site after any GitHub release is public so
  # the checked-in changelog snapshot is rebuilt against the newly published
  # release list. Production releases still require the reviewed website branch
  # to contain the matching release notes file before deployment.
  # Requires VERCEL_TOKEN to be set in repo secrets. If the secret is absent
  # the step exits cleanly without failing the workflow.
  publish-website:
    name: Deploy Website
    needs: [publish, notes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: www
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Verify website production branch contains this release
        if: needs.notes.outputs.release_channel == 'production'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE_JSON="release-notes/releases/${TAG}.json"

          if [[ ! -f "$RELEASE_JSON" ]]; then
            echo "Website production deploys must ship from the www branch." >&2
            echo "Missing ${RELEASE_JSON} on www for ${TAG}." >&2
            echo "Merge the reviewed website and changelog updates into www before this production website deploy can run." >&2
            exit 1
          fi

      - name: Wait for published GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in {1..30}; do
            draft_state=$(gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" --jq '.draft')
            if [ "$draft_state" = "false" ]; then
              echo "Release ${{ github.ref_name }} is published."
              exit 0
            fi

            echo "Release ${{ github.ref_name }} is still draft, retrying in 10s (${attempt}/30)"
            sleep 10
          done

          echo "Release ${{ github.ref_name }} never became published."
          exit 1

      - name: Deploy website to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured, skipping website deploy"
            echo "Add a VERCEL_TOKEN secret to enable automatic website changelog refresh."
            exit 0
          fi
          ./scripts/vercel-deploy-production.sh website "$VERCEL_TOKEN"
  # Deploy the PWA to Vercel after the GitHub release is published so the
  # version shown in the app always matches the shipped desktop release.
  # Requires VERCEL_TOKEN to be set in repo secrets. If the secret is absent
  # the step exits cleanly without failing the workflow.
  publish-pwa:
    name: Deploy PWA
    needs: [publish, notes]
    if: needs.notes.outputs.release_channel == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Deploy PWA to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured, skipping PWA deploy"
            echo "Add a VERCEL_TOKEN secret to enable automated PWA deployment."
            exit 0
          fi
          ./scripts/vercel-deploy-production.sh pwa "$VERCEL_TOKEN"
