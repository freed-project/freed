name: Validation

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tooling-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tooling smoke tests
        run: npm run test:scripts

  feature:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/desktop

      - name: Run feature validation
        run: npm run validate:feature
        env:
          CI: "true"

      - name: Run perf regression check
        if: always()
        run: |
          if [ -f packages/desktop/playwright-report/perf-results.json ]; then
            npx tsx scripts/perf-compare.ts \
              packages/desktop/playwright-report/perf-results.json \
              packages/desktop/tests/e2e/perf-baselines.json \
              packages/desktop/tests/e2e/perf-budgets.json \
              | tee perf-comparison.md
          else
            echo "No perf results found - skipping comparison"
          fi

      - name: Comment perf comparison on PR
        if: always() && hashFiles('perf-comparison.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('perf-comparison.md')) return;
            const body = fs.readFileSync('perf-comparison.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request?.number ?? context.issue.number,
              body: `## Performance Benchmark Results\n\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.sha }}
          path: packages/desktop/playwright-report/perf-results.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/desktop/playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/desktop/test-results/
          retention-days: 7

  dev:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/desktop

      - name: Run dev validation
        run: npm run validate:dev
        env:
          CI: "true"

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/desktop/playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/desktop/test-results/
          retention-days: 7
