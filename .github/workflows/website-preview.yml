name: Website Build

on:
  pull_request:
    branches: [www]
    paths:
      - "website/**"
      - "packages/shared/**"
      - "packages/ui/**"
      - "release-notes/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/website-preview.yml"

concurrency:
  group: website-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: |
          cd website
          npm run build
