name: E2E — Desktop (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "packages/desktop/**"
      - "packages/ui/**"
      - "packages/shared/**"
      - "packages/sync/**"
      - ".github/workflows/e2e-desktop.yml"

jobs:
  e2e:
    name: Smoke tests (Chromium, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/desktop

      - name: Run e2e smoke tests
        run: npm run test:e2e --workspace=packages/desktop
        env:
          CI: "true"

      - name: Run perf regression check
        if: always()
        run: |
          if [ -f packages/desktop/playwright-report/perf-results.json ]; then
            npx tsx scripts/perf-compare.ts \
              packages/desktop/playwright-report/perf-results.json \
              packages/desktop/tests/e2e/perf-baselines.json \
              packages/desktop/tests/e2e/perf-budgets.json \
              | tee perf-comparison.md
          else
            echo "No perf results found — skipping comparison"
          fi

      - name: Comment perf comparison on PR
        if: always() && github.event_name == 'pull_request' && hashFiles('perf-comparison.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('perf-comparison.md')) return;
            const body = fs.readFileSync('perf-comparison.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Performance Benchmark Results\n\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.sha }}
          path: packages/desktop/playwright-report/perf-results.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/desktop/playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/desktop/test-results/
          retention-days: 7
