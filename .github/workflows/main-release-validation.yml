name: Production Validation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/main-release-validation.yml"
      - ".github/workflows/release.yml"
      - "package.json"
      - "packages/desktop/package.json"
      - "packages/pwa/package.json"
      - "release-notes/**"
      - "scripts/generate-tauri-latest-from-release.mjs"
      - "scripts/generate-tauri-latest-from-release.test.mjs"
      - "scripts/prepare-release-notes.mjs"
      - "scripts/release-publish.sh"
      - "scripts/release-notes-shared.mjs"
      - "scripts/release-notes-shared.test.mjs"
      - "scripts/release.sh"
      - "scripts/validate-release-notes.mjs"
      - "scripts/validate-worktree.mjs"
      - "scripts/validate-worktree.test.mjs"
      - "website/package.json"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/main-release-validation.yml"
      - ".github/workflows/release.yml"
      - "package.json"
      - "packages/desktop/package.json"
      - "packages/pwa/package.json"
      - "release-notes/**"
      - "scripts/generate-tauri-latest-from-release.mjs"
      - "scripts/generate-tauri-latest-from-release.test.mjs"
      - "scripts/prepare-release-notes.mjs"
      - "scripts/release-publish.sh"
      - "scripts/release-notes-shared.mjs"
      - "scripts/release-notes-shared.test.mjs"
      - "scripts/release.sh"
      - "scripts/validate-release-notes.mjs"
      - "scripts/validate-worktree.mjs"
      - "scripts/validate-worktree.test.mjs"
      - "website/package.json"

concurrency:
  group: release-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-production:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/desktop

      - name: Run production validation
        run: npm run validate:production
        env:
          CI: "true"

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/desktop/playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/desktop/test-results/
          retention-days: 7
